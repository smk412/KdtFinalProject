<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head></head>
<body>
<div th:fragment="headerFragment" class="nav_menu" style="display: flex; justify-content: space-between; align-items: center; width: 100%; padding: 10px 20px; box-sizing: border-box;">
    
    <div class="header-title-area">
	    <h1 class="header-title-left"
	        th:text="${project != null ? project.projectTitle : '　'}">
	    </h1>
	</div>
    
    <div class="header-profile-right" style="margin-left: auto;">
        
        <div class="notif-wrap" id="notifWrap"
             th:attr="data-web-notif-yn=${currentUser != null ? currentUser.webNotificationYn : 'Y'}">
            <a href="#" id="notifBellBtn">
                <i class="fa fa-bell"></i>
                <span class="badge bg-red" id="notifUnreadBadge"
                      th:style="${headerUnreadCount > 0} ? '' : 'display:none;'"
                      th:text="${headerUnreadCount > 99} ? '99+' : ${headerUnreadCount}">0</span>
            </a>
            <div class="notif-dropdown" id="notifDropdown" style="display:none;">
                <!-- /notification/popover 프래그먼트(최근 알림 내역)가 AJAX로 이 안을 채운다 -->
            </div>
        </div>
        
        <!-- 화면설명(Dv-044) 1: 헤더 영역의 프로필 아이콘을 통해 마이페이지로 이동한다. -->
        <!-- currentUser 는 SecurityModelAdvice에서 세션의 LoginUserVO를 그대로 꺼내 넣어준다 -->
        <a th:href="@{/mypage}" title="마이페이지" class="header-profile-link">
            <img th:if="${currentUser != null and currentUser.profileImage != null and currentUser.profileImage != ''}"
                 th:src="${currentUser.profileImage}"
                 alt="Profile">
            <img th:unless="${currentUser != null and currentUser.profileImage != null and currentUser.profileImage != ''}"
                 th:src="@{/images/default-profile.svg}"
                 alt="Profile">

            <span class="user-name"
                  th:text="${currentUser != null ? currentUser.userName : '김위플'}">김위플</span>
        </a>
        
        <form th:action="@{/logout}" method="post" style="margin: 0; display: flex; align-items: center;">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit" title="로그아웃" aria-label="로그아웃">
                <i class="fa fa-sign-out"></i>
            </button>
        </form>
        
    </div>

    <!-- 실시간 알림 팝업(토스트)이 우측 하단에 쌓이는 컨테이너 -->
    <div id="notifToastContainer" class="notif-toast-container"></div>

</div>
</body>
</html>
