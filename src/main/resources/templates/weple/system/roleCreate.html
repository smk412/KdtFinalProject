<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org/"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      th:replace="~{common/layouts/default_layout :: layout(~{::section}, ~{::head})}">
<head>
    <meta charset="UTF-8">
    <title th:text="${mode == 'edit'} ? '역할 수정' : '역할 등록'"></title>
    <link rel="stylesheet" href="/css/system/role-create.css">
</head>
<body>
<section class="role-create-page">
    <h3 class="role-create-title"
        th:text="${mode == 'edit'} ? '역할 수정' : '역할 등록'"></h3>
    <div class="role-create-card">

        <form method="post"
              th:action="${mode == 'edit'} ? @{/system/role/edit} : @{/system/role/create}">

            <!-- CSRF 추가 -->
            <input type="hidden"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}">

            <input th:if="${mode == 'edit'}" type="hidden"
                   name="roleId" th:value="${role.roleId}">

            <!-- ① 역할 이름 -->
            <div class="perm-row name-row">
                <div class="perm-box name-box">
                    <span class="perm-box-label required">역할 이름</span>
                    <input type="text"
                           name="roleName"
                           class="role-name-input"
                           th:value="${mode == 'edit'} ? ${role.roleName} : ''"
                           placeholder="역할 이름을 입력하세요."
                           required>
                </div>
            </div>

            <!-- 전체선택/해제 컨트롤 -->
            <div class="perm-ctrl-row">
                <span class="perm-section-title">권한 설정</span>
                <div class="perm-ctrl-btns">
                    <button type="button" class="perm-ctrl-btn" id="selectAll">전체선택</button>
                    <button type="button" class="perm-ctrl-btn" id="deselectAll">전체해제</button>
                </div>
            </div>

            <div class="perm-box-outer">
                <th:block th:each="entry, stat : ${groupedPermissions}">
                    <div class="perm-group">
					    <div class="perm-group-label" th:text="${entry.key}"></div>
					
					    <div class="perm-content">
					        <button type="button"
					                class="group-all-btn"
					                onclick="toggleGroup(this)">
					            전체
					        </button>
					
					        <div class="perm-checks">
					            <label class="perm-check-item"
					                   th:each="perm : ${entry.value}">
					                <input type="checkbox"
					                       name="permissionCodes"
					                       th:value="${perm.permissionCode}"
					                       th:checked="${mode == 'edit'
					                                     and checkedCodes != null
					                                     and #lists.contains(checkedCodes, perm.permissionCode)}">
					
					                <span class="custom-check-box"></span>
					                <span class="perm-text"
					                      th:text="${perm.permissionName}"></span>
					            </label>
					        </div>
					    </div>
					</div>
                    <hr th:if="${!stat.last}" class="perm-divider">
                </th:block>
            </div>
            <div class="btn-area">
                <button type="button" class="page-btn btn-cancel"
                        onclick="history.back()">취소</button>
                <button type="submit" class="page-btn btn-submit"
                        th:text="${mode == 'edit'} ? '수정' : '등록'"></button>
            </div>

        </form>
    </div>

    <script>
	    /* 상단 전체선택/전체해제 (모든 그룹 대상) */
	    document.getElementById("selectAll").addEventListener("click", function () {
	        document.querySelectorAll('input[name="permissionCodes"]').forEach(cb => cb.checked = true);
	        document.querySelectorAll('.perm-group').forEach(updateGroupButtonLabel);
	    });
	    document.getElementById("deselectAll").addEventListener("click", function () {
	        document.querySelectorAll('input[name="permissionCodes"]').forEach(cb => cb.checked = false);
	        document.querySelectorAll('.perm-group').forEach(updateGroupButtonLabel);
	    });
	
	    /* 그룹별 "전체 선택"/"전체 해제" 버튼 클릭 */
	    function toggleGroup(btn) {
	        const group = btn.closest('.perm-group');
	        const checks = group.querySelectorAll('input[name="permissionCodes"]');
	        const allChecked = [...checks].every(cb => cb.checked);
	        checks.forEach(cb => { cb.checked = !allChecked; });
	        updateGroupButtonLabel(group);
	    }
	
	    /* 그룹 내 체크 상태에 맞춰 버튼 라벨 갱신
	       - 전부 체크 → "전체 해제"
	       - 하나라도 해제 → "전체 선택" */
	    function updateGroupButtonLabel(group) {
	        const checks = group.querySelectorAll('input[name="permissionCodes"]');
	        const btn = group.querySelector('.group-all-btn');
	        if (!btn || checks.length === 0) return;
	        const allChecked = [...checks].every(cb => cb.checked);
	        btn.textContent = allChecked ? '전체해제' : '전체선택';
	    }
	
	    /* 개별 체크박스를 직접 클릭했을 때도 그룹 버튼 라벨 동기화 */
	    document.querySelectorAll('input[name="permissionCodes"]').forEach(cb => {
	        cb.addEventListener('change', () => {
	            updateGroupButtonLabel(cb.closest('.perm-group'));
	        });
	    });
	
	    /* 수정 모드 등 페이지 로드시 이미 체크되어 있는 그룹은 처음부터 "전체 해제"로 표시 */
	    document.querySelectorAll('.perm-group').forEach(updateGroupButtonLabel);
	</script>
</section>
</body>
</html>
