<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org/"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      th:replace="~{common/layouts/default_layout :: layout(~{::section}, ~{::head})}">

<head>
    <meta charset="UTF-8">
    <title>작업 내역 목록</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flatpickr/4.6.13/flatpickr.min.css">
    <link rel="stylesheet" href="/css/history/worklog.css">
</head>
<body>

<section class="project-page">
    <div class="project-toolbar-top">
        <h3 class="project-title">전체 작업 내역</h3>
        <div class="total-time-card">
            <div class="time-title">총 소요시간</div>
            <div class="time-value"
                 th:text="${totalSpentHour != null and totalSpentHour > 0
                          ? #numbers.formatDecimal(totalSpentHour, 1, 1) + 'h'
                          : '-'}">
            </div>
            <div class="time-period"
                 th:text="${startDate} + ' → ' + ${endDate}">
            </div>
        </div>
    </div>

    <div class="project-card">
        <form id="searchForm" method="get" th:action="@{/worklog}">
            <!-- ★ 검색 버튼 클릭 시 search=true 전송 -->
            <input type="hidden" id="searchFlag" name="search" value="true">

            <div class="filter-toolbar">

                <!-- 프로젝트 필터 -->
                <div class="filter-group">
                    <label class="filter-label">프로젝트</label>
                    <select name="projectId" class="filter-select">
                        <option value="">전체 프로젝트</option>
                        <optgroup label="진행 중인 프로젝트">
                            <option th:each="project : ${projects}"
                                    th:if="${project.status != '완료'}"
                                    th:value="${project.projectId}"
                                    th:text="${project.projectTitle}"
                                    th:selected="${project.projectId.toString() == projectId}">
                            </option>
                        </optgroup>
                        <optgroup label="완료된 프로젝트">
                            <option th:each="project : ${projects}"
                                    th:if="${project.status == '완료'}"
                                    th:value="${project.projectId}"
                                    th:text="${project.projectTitle}"
                                    th:selected="${project.projectId.toString() == projectId}">
                            </option>
                        </optgroup>
                    </select>
                </div>

                <!-- 조회 기간 -->
                <div class="filter-group">
                    <label class="filter-label">조회 기간</label>
                    <div class="date-range-wrap">
                        <button type="button" id="dateBackBtn" class="date-arrow-btn">이전 5일</button>
                        <input type="text" id="startDateInput" name="startDate"
                               th:value="${startDate}" class="filter-input-date"
                               placeholder="2026.06.05" readonly>
                        <span class="date-separator">~</span>
                        <input type="text" id="endDateInput" name="endDate"
                               th:value="${endDate}" class="filter-input-date"
                               placeholder="2026.06.09" readonly>
                        <button type="button" id="recentPeriodBtn" class="date-period-btn">최근 5일</button>
                    </div>
                </div>

                <!-- 사용자 필터 -->
                <div class="filter-group">
                    <label class="filter-label">사용자</label>
                    <select name="userCode" class="filter-select">
                        <option value="">전체</option>
                        <option th:each="user : ${users}"
                                th:value="${user.userCode}"
                                th:text="${user.userName}"
                                th:selected="${user.userCode == userCode}">
                        </option>
                    </select>
                </div>

                <!-- 검색 / 초기화 버튼 -->
                <div class="filter-group">
                    <label class="filter-label">&nbsp;</label>
                    <div class="date-range-wrap">
                        <button type="submit" class="btn-search">검색</button>
                        <button type="button" id="resetBtn" class="date-period-btn">초기화</button>
                    </div>
                </div>
            </div>

            <!-- 일감유형 체크박스 -->
            <div class="filter-checkbox-row">
                <label class="checkbox-inline">
                    <input type="checkbox" name="typeNames" value="기획"
                           th:checked="${typeNames != null and #lists.contains(typeNames, '기획')}">
                    <span class="custom-check-box"></span> 기획
                </label>
                <label class="checkbox-inline">
                    <input type="checkbox" name="typeNames" value="새 기능"
                           th:checked="${typeNames != null and #lists.contains(typeNames, '새 기능')}">
                    <span class="custom-check-box"></span> 새 기능
                </label>
                <label class="checkbox-inline">
                    <input type="checkbox" name="typeNames" value="개선"
                           th:checked="${typeNames != null and #lists.contains(typeNames, '개선')}">
                    <span class="custom-check-box"></span> 개선
                </label>
                <label class="checkbox-inline">
                    <input type="checkbox" name="typeNames" value="피드백"
                           th:checked="${typeNames != null and #lists.contains(typeNames, '피드백')}">
                    <span class="custom-check-box"></span> 피드백
                </label>
            </div>
        </form>

        <h4 class="sub-list-title">전체 작업 내역 목록</h4>

        <!-- ★ 검색 전 안내 메시지 -->
        <div th:if="${!searched}" class="empty-message">
            필터를 설정하고 검색 버튼을 눌러주세요.
        </div>

        <!-- ★ 검색 후 결과 표시 -->
        <th:block th:if="${searched}">
            <th:block th:with="validLogs=${workLogList != null ? workLogList.?[#this != null] : {}}">

                <div th:if="${#lists.isEmpty(validLogs)}" class="empty-message">
                    조회된 작업 내역이 없습니다.
                </div>

                <th:block th:unless="${#lists.isEmpty(validLogs)}"
                          th:each="log, stat : ${validLogs}"
                          th:with="
                            prevLog=${stat.first ? null : validLogs[stat.index - 1]},
                            prevKey=${(prevLog == null or prevLog.actionAt == null) ? null : #temporals.format(prevLog.actionAt, 'yyyy-MM-dd')},
                            curKey=${log.actionAt != null ? #temporals.format(log.actionAt, 'yyyy-MM-dd') : '미정'}">

                    <th:block th:if="${stat.first or prevKey != curKey}">
                        <div class="date-section-title" th:text="${curKey}">2026-06-19</div>
                        <div class="project-table-wrap">
                            <table class="project-table">
                                <thead>
                                    <tr>
                                        <th>등록일시</th>
                                        <th>프로젝트</th>
                                        <th>사용자</th>
                                        <th>일감</th>
                                        <th>일감유형</th>
                                        <th>작업유형</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr class="worklog-item-row"
                                        th:each="innerLog : ${validLogs}"
                                        th:if="${innerLog.actionAt != null ? #temporals.format(innerLog.actionAt,'yyyy-MM-dd') : '미정'} == ${curKey}">
                                        <td th:text="${innerLog.actionAt != null ? #temporals.format(innerLog.actionAt,'HH:mm') : '00:00'}">14:20</td>
                                        <td class="text-left" th:text="${innerLog.projectTitle}">WEPLE</td>
                                        <td th:text="${innerLog.userName}">신짱구</td>
                                        <td class="text-left" th:text="${innerLog.taskTitle}">로그인 기능 구현</td>
                                        <td>
                                            <span th:if="${innerLog.typeName == '기획'}" class="status-badge type-dev" th:text="${innerLog.typeName}"></span>
                                            <span th:if="${innerLog.typeName == '새 기능'}" class="status-badge type-bug" th:text="${innerLog.typeName}"></span>
                                            <span th:if="${innerLog.typeName == '개선'}" class="status-badge type-support" th:text="${innerLog.typeName}"></span>
                                            <span th:if="${innerLog.typeName == '피드백'}" class="status-badge type-improve" th:text="${innerLog.typeName}"></span>
                                            <span th:if="${innerLog.typeName != '기획' and innerLog.typeName != '새 기능' and innerLog.typeName != '개선' and innerLog.typeName != '피드백'}"
                                                  class="status-badge type-default" th:text="${innerLog.typeName}"></span>
                                        </td>
                                        <td>
                                            <span th:if="${innerLog.actionType == 'CREATE'}" class="action-badge action-create">CREATE</span>
                                            <span th:if="${innerLog.actionType == 'UPDATE'}" class="action-badge action-update">UPDATE</span>
                                            <span th:if="${innerLog.actionType == 'DELETE'}" class="action-badge action-delete">DELETE</span>
                                            <span th:if="${innerLog.actionType != 'CREATE' and innerLog.actionType != 'UPDATE' and innerLog.actionType != 'DELETE'}"
                                                  class="action-badge action-default" th:text="${innerLog.actionType}"></span>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </th:block>

                </th:block>

            </th:block>

            <!-- 페이징 -->
            <div class="pagination-wrap">
                <a th:href="${currentPage > 1}
                        ? @{/worklog(page=${currentPage - 1}, projectId=${projectId}, startDate=${startDate}, endDate=${endDate}, userCode=${userCode}, typeNames=${typeNames}, search='true')}
                        : '#'"
                   th:classappend="${currentPage <= 1} ? 'disabled'"
                   class="page-btn">&lt; 이전</a>
                <th:block th:if="${totalPages > 0}" th:each="i : ${#numbers.sequence(1, totalPages)}">
                    <a th:href="@{/worklog(page=${i}, projectId=${projectId}, startDate=${startDate}, endDate=${endDate}, userCode=${userCode}, typeNames=${typeNames}, search='true')}"
                       th:text="${i}" th:classappend="${i == currentPage} ? 'active'" class="page-btn">1</a>
                </th:block>
                <a th:href="${currentPage < totalPages}
                        ? @{/worklog(page=${currentPage + 1}, projectId=${projectId}, startDate=${startDate}, endDate=${endDate}, userCode=${userCode}, typeNames=${typeNames}, search='true')}
                        : '#'"
                   th:classappend="${currentPage >= totalPages} ? 'disabled'"
                   class="page-btn">다음 &gt;</a>
            </div>
        </th:block>

    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/flatpickr/4.6.13/flatpickr.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/flatpickr/4.6.13/l10n/ko.js"></script>

    <script th:inline="javascript">
        (function () {
            var DATE_FORMAT = 'Y.m.d';
            if (window.flatpickr && flatpickr.l10ns && flatpickr.l10ns.ko) {
                flatpickr.localize(flatpickr.l10ns.ko);
            }
            function parseFormatted(str) {
                if (!str) return null;
                var parts = str.split('.');
                if (parts.length !== 3) return null;
                var d = new Date(parseInt(parts[0], 10), parseInt(parts[1], 10) - 1, parseInt(parts[2], 10));
                return isNaN(d.getTime()) ? null : d;
            }
            function addDays(date, days) {
                var d = new Date(date.getTime());
                d.setDate(d.getDate() + days);
                return d;
            }

            var startInput = document.getElementById('startDateInput');
            var endInput   = document.getElementById('endDateInput');
            var searchForm = document.getElementById('searchForm');
            var searchFlag = document.getElementById('searchFlag');

            function syncTimePeriod() {
                var periodEl = document.querySelector('.time-period');
                if (periodEl && startInput.value && endInput.value) {
                    periodEl.textContent = startInput.value + ' ~ ' + endInput.value;
                }
            }

            var startPicker = flatpickr(startInput, {
                dateFormat: DATE_FORMAT, allowInput: false,
                onChange: function (selectedDates) {
                    if (selectedDates[0]) endPicker.set('minDate', selectedDates[0]);
                }
            });
            var endPicker = flatpickr(endInput, {
                dateFormat: DATE_FORMAT, allowInput: false,
                onChange: function (selectedDates) {
                    if (selectedDates[0]) startPicker.set('maxDate', selectedDates[0]);
                }
            });

            function setRange(start, end) {
                startPicker.set('maxDate', null);
                endPicker.set('minDate', null);
                startPicker.setDate(start, false);
                endPicker.setDate(end, false);
                startPicker.set('maxDate', end);
                endPicker.set('minDate', start);
            }
            function applyRecentDays(days) {
                var today = new Date();
                setRange(addDays(today, -(days - 1)), today);
            }

            var initStart = parseFormatted(startInput.value);
            var initEnd   = parseFormatted(endInput.value);
            if (initStart && initEnd) {
                setRange(initStart, initEnd);
            } else {
                applyRecentDays(5);
            }
            syncTimePeriod();

            // 최근 5일 버튼 - search=true 로 바로 submit
            document.getElementById('recentPeriodBtn').addEventListener('click', function () {
                applyRecentDays(5);
                searchFlag.value = 'true';
                setTimeout(function () { syncTimePeriod(); searchForm.submit(); }, 0);
            });

            // 이전 5일 버튼 - search=true 로 바로 submit
            document.getElementById('dateBackBtn').addEventListener('click', function () {
                var curStart = parseFormatted(startInput.value);
                var curEnd   = parseFormatted(endInput.value);

                if (!curStart || !curEnd) {
                    applyRecentDays(5);
                } else {
                    var rangeDays = Math.round((curEnd.getTime() - curStart.getTime()) / (24*60*60*1000)) + 1;
                    var newEnd    = addDays(curStart, -1);
                    var newStart  = addDays(newEnd, -(rangeDays - 1));
                    setRange(newStart, newEnd);
                }
                searchFlag.value = 'true';
                setTimeout(function () { syncTimePeriod(); searchForm.submit(); }, 0);
            });

            // ★ 초기화 버튼 - 모든 필터 초기화 후 빈 화면으로
            document.getElementById('resetBtn').addEventListener('click', function () {
                var projectSelect = searchForm.querySelector('select[name="projectId"]');
                if (projectSelect) projectSelect.value = '';

                var userSelect = searchForm.querySelector('select[name="userCode"]');
                if (userSelect) userSelect.value = '';

                searchForm.querySelectorAll('input[type="checkbox"]').forEach(function(cb) {
                    cb.checked = false;
                });

                applyRecentDays(5);

                // ★ search=false → 빈 화면으로
                searchFlag.value = 'false';
                setTimeout(function () { syncTimePeriod(); searchForm.submit(); }, 0);
            });
        })();
    </script>
</section>

</body>
</html>
