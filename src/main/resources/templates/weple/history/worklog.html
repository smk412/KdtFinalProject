<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org"
      th:replace="~{common/layouts/default_layout :: layout(~{::section})}">

<head>
    <meta charset="UTF-8">
    <title>작업 내역 목록</title>
</head>
<body>
	
<section class="project-page">
    <div class="project-toolbar-top">
        <h3 class="project-title">전체 작업 내역</h3>
        <div class="total-time-card">
            <div class="time-title">총 소요시간</div>
            <div class="time-value" th:text="${totalWorkTime != null ? totalWorkTime : '428h 15m'}">428h 15m</div>
            <div class="time-period" th:text="${searchPeriod != null ? searchPeriod : '2026.06.05 ~ 2026.06.09'}">2026.06.05 ~ 2026.06.09</div>
        </div>
    </div>
 
    <div class="project-card">
        <form id="searchForm" method="get" th:action="@{/worklog}">
            <div class="filter-toolbar">
                <div class="filter-group">
                    <label class="filter-label">프로젝트</label>
                    <select name="projectId" class="filter-select" onchange="document.getElementById('searchForm').submit()">
                        <option value="">전체 프로젝트</option>
                        <option th:each="project : ${projects}" 
                            th:value="${project.projectId}" 
                            th:text="${project.projectTitle}"
                            th:selected="${project.projectId.toString() == projectId}">
                        </option>
                    </select>
                </div>
                
                <div class="filter-group">
                    <label class="filter-label">조회 기간</label>
                    <div class="date-range-wrap">
                        <button type="button" id="dateBackBtn" class="date-arrow-btn">&larr; 뒤로</button>
                        <input type="text" id="startDateInput" name="startDate" th:value="${param.startDate}" class="filter-input-date" placeholder="2026.06.05" readonly>
                        <span class="date-separator">~</span>
                        <input type="text" id="endDateInput" name="endDate" th:value="${param.endDate}" class="filter-input-date" placeholder="2026.06.09" readonly>
                        <button type="button" id="recentPeriodBtn" class="date-period-btn">최근 5일</button>
                    </div>
                </div>
                <div class="filter-group">
                    <label class="filter-label">사용자</label>
                    <select name="userCode" class="filter-select">
                        <option value="">전체</option>
                        <option th:each="user : ${users}" 
                            th:value="${user.userCode}" 
                            th:text="${user.userName}"
                            th:selected="${user.userCode == param.userCode}"></option>
                    </select>
                </div>
            </div>
            
            <div class="filter-checkbox-row">
			    <label class="checkbox-inline">
			        <input type="checkbox"
			               name="typeNames"
			               value="기획"
			               onchange="document.getElementById('searchForm').submit()"
			               th:checked="${typeNames != null and #lists.contains(typeNames, '기획')}">
			        <span class="custom-check-box"></span> 기획
			    </label>
			
			    <label class="checkbox-inline">
			        <input type="checkbox"
			               name="typeNames"
			               value="새 기능"
			               onchange="document.getElementById('searchForm').submit()"
			               th:checked="${typeNames != null and #lists.contains(typeNames, '새 기능')}">
			        <span class="custom-check-box"></span> 새 기능
			    </label>
			
			    <label class="checkbox-inline">
			        <input type="checkbox"
			               name="typeNames"
			               value="개선"
			               onchange="document.getElementById('searchForm').submit()"
			               th:checked="${typeNames != null and #lists.contains(typeNames, '개선')}">
			        <span class="custom-check-box"></span> 개선
			    </label>
			
			    <label class="checkbox-inline">
			        <input type="checkbox"
			               name="typeNames"
			               value="피드백"
			               onchange="document.getElementById('searchForm').submit()"
			               th:checked="${typeNames != null and #lists.contains(typeNames, '피드백')}">
			        <span class="custom-check-box"></span> 피드백
			    </label>
			</div>
        </form>
 
        <h4 class="sub-list-title">전체 작업 내역 목록</h4>
 
        <th:block th:with="validLogs=${workLogList != null ? workLogList.?[#this != null] : {}}">
 
            <div th:if="${#lists.isEmpty(validLogs)}" class="empty-message">조회된 작업 내역이 없습니다.</div>
 
            <th:block th:each="log, stat : ${validLogs}"
                      th:with="prevLog=${stat.first ? null : validLogs[stat.index - 1]},
                               prevKey=${(prevLog == null or prevLog.actionAt == null) ? null : #temporals.format(prevLog.actionAt, 'yyyy-MM-dd')},
                               curKey=${log.actionAt != null ? #temporals.format(log.actionAt, 'yyyy-MM-dd') : '미정'}">
 
                <th:block th:if="${stat.first or prevKey != curKey}">
 
                    <th:block th:unless="${stat.first}">
                        </tbody>
                        </table>
                    </th:block>
 
                    <div class="date-section-title" th:text="${curKey}">2026-06-19</div>
 
                    <div class="project-table-wrap">
                        <table class="project-table">
                            <thead>
                                <tr>
                                    <th>등록일시</th>
                                    <th>프로젝트</th>
                                    <th>사용자</th>
                                    <th>일감</th>
                                    <th>일감유형</th>
                                    <th>작업유형</th>
                                </tr>
                            </thead>
                            <tbody>
                </th:block>
 
                <tr class="worklog-item-row">
                    <td th:text="${log.actionAt != null ? #temporals.format(log.actionAt, 'HH:mm') : '00:00'}">14:20</td>
                    <td class="text-left" th:text="${log.projectTitle}">WEPLE</td>
                    <td th:text="${log.userName}">신짱구</td>
                    <td class="text-left" th:text="${log.taskTitle}">로그인 기능 구현</td>
                    <td>
                        <span th:if="${log.typeName == '기획'}" class="status-badge type-dev" th:text="${log.typeName}">기획</span>
                        <span th:if="${log.typeName == '새 기능'}" class="status-badge type-bug" th:text="${log.typeName}">새 기능</span>
                        <span th:if="${log.typeName == '개선'}" class="status-badge type-support" th:text="${log.typeName}">개선</span>
                        <span th:if="${log.typeName == '피드백'}" class="status-badge type-improve" th:text="${log.typeName}">피드백</span>
                        <span th:if="${log.typeName != '기획' and log.typeName != '새 기능' and log.typeName != '개선' and log.typeName != '피드백'}" class="status-badge type-default" th:text="${log.typeName}">-</span>
                    </td>
                    <td class="action-cell" th:text="${log.actionType}">CREATE</td>
                </tr>
 
                <th:block th:if="${stat.last}">
                            </tbody>
                        </table>
                    </div>
                </th:block>
 
            </th:block>
 
        </th:block>
 
        <div class="pagination-wrap">
            <a href="#" class="page-btn disabled">&lt; 이전</a>
            <a href="#" class="page-btn active">1</a>
            <a href="#" class="page-btn">2</a>
            <a href="#" class="page-btn">3</a>
            <a href="#" class="page-btn">4</a>
            <a href="#" class="page-btn">5</a>
            <a href="#" class="page-btn">다음 &gt;</a>
        </div>
    </div>
    
    <style>

		    background: #f5f6fa !important;
		}

		}

		}

		    color: #222;

		}
		
		.total-time-card {
		    width: 180px;
		    min-width: 180px;
		    height: 95px;

		}
		
		.time-value {

		.filter-toolbar {

		    color: #222;
		    margin: 25px 0 15px;
		}
		
		.date-section-title {
		    font-size: 14px;
		    font-weight: 700;
		    color: #4d84ff;
		    margin: 18px 0 8px;
		}
		
		.date-section-title:first-of-type {
		    margin-top: 0;
		}
		
		.project-table-wrap {
		    border: 1px solid #e6ecf5;
		    border-radius: 10px;
		    overflow: hidden;
		    background: #fff;
		    margin-bottom: 18px;
		}
		
		.project-table {
		    width: 100%;
		    border-collapse: collapse;
		    table-layout: fixed;
		}

		.project-table th:nth-child(1), .project-table td:nth-child(1) { width: 11%; }
		.project-table th:nth-child(2), .project-table td:nth-child(2) { width: 16%; }
		.project-table th:nth-child(3), .project-table td:nth-child(3) { width: 11%; }
		.project-table th:nth-child(4), .project-table td:nth-child(4) { width: 32%; }
		.project-table th:nth-child(5), .project-table td:nth-child(5) { width: 15%; }
		.project-table th:nth-child(6), .project-table td:nth-child(6) { width: 15%; }
		
		.project-table th {

		    font-size: 12px;
		    font-weight: 700;
		    color: #5d6b87;

		.project-table td {

		    padding: 0 15px;

		    color: #495057;

		    overflow: hidden;

		    white-space: nowrap;
		}

		/* 일감(작업내용) 컬럼만 줄바꿈 허용 — 내용이 길어도 잘리지 않게 */
		.project-table td:nth-child(4) {
		    white-space: normal;
		    word-break: break-all;
		}
		
		.project-table th:nth-child(2),
		.project-table td:nth-child(2),
		.project-table th:nth-child(4),
		.project-table td:nth-child(4) {
		    text-align: left;
		    padding-left: 20px;
		}
		
		.project-table tbody tr:first-child td {
		    border-top: none;
		}
		
		.project-table tbody tr:hover {
		    background: #fafcff;
		}
		
		.status-badge {
		    display: inline-flex;
		    align-items: center;
		    justify-content: center;

		    height: 24px;

		}
		
		.type-bug {

		    color: #f64e60;
		}
		
		.type-support {

		    color: #b55dff;
		}
		
		.type-improve {
		    background: #e8fff3;
		    color: #50cd89;
		}
		
		.type-default {
		    background: #f1f3f7;
		    color: #8a99b5;
		}
		
		.action-cell {

		    font-weight: 600;
		}
		
		.empty-message {
		    padding: 50px !important;
		    text-align: center;
		    color: #adb5bd;
		}
		
		.pagination-wrap {
		    display: flex;
		    justify-content: center;
		    gap: 6px;
		    margin-top: 8px;
		}
		
		.page-btn {

		    align-items: center;
		    justify-content: center;

		/* ===== Flatpickr 커스텀 테마 ===== */

		}

		.flatpickr-days {

		.flatpickr-day.prevMonthDay,

		.flatpickr-day:hover {
		    background: #eef4ff;

		    color: #4d84ff;

		/* [수정2] 오늘 날짜 스타일 */

		.flatpickr-day.inRange {
		    background: #eef4ff !important;
		    border-color: #eef4ff !important;
		    box-shadow: -5px 0 0 #eef4ff, 5px 0 0 #eef4ff !important;
		    color: #4d84ff !important;
		}

		.numInputWrapper:hover {
		    background: transparent;
		}
    </style>

    <!-- Flatpickr 캘린더 라이브러리 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flatpickr/4.6.13/flatpickr.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/flatpickr/4.6.13/flatpickr.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/flatpickr/4.6.13/l10n/ko.js"></script>

    <script th:inline="javascript">
        (function () {
            var DATE_FORMAT = 'Y.m.d';

            if (window.flatpickr && flatpickr.l10ns && flatpickr.l10ns.ko) {
                flatpickr.localize(flatpickr.l10ns.ko);
            }

            function parseFormatted(str) {
                if (!str) return null;
                var parts = str.split('.');
                if (parts.length !== 3) return null;
                var d = new Date(parseInt(parts[0], 10), parseInt(parts[1], 10) - 1, parseInt(parts[2], 10));
                return isNaN(d.getTime()) ? null : d;
            }

            function addDays(date, days) {
                var d = new Date(date.getTime());
                d.setDate(d.getDate() + days);
                return d;
            }

            var startInput = document.getElementById('startDateInput');
            var endInput   = document.getElementById('endDateInput');
            var searchForm = document.getElementById('searchForm');

            var autoSubmitEnabled = false;

            /* [수정4] 소요시간 카드 기간 텍스트 동기화 */
            function syncTimePeriod() {
                var periodEl = document.querySelector('.time-period');
                if (periodEl && startInput.value && endInput.value) {
                    periodEl.textContent = startInput.value + ' ~ ' + endInput.value;
                }
            }

            function submitSearchForm() {
                syncTimePeriod();
                if (autoSubmitEnabled && searchForm) {
                    searchForm.submit();
                }
            }

            var startPicker = flatpickr(startInput, {
                dateFormat: DATE_FORMAT,
                allowInput: false,
                onChange: function (selectedDates) {
                    if (selectedDates[0]) {
                        endPicker.set('minDate', selectedDates[0]);
                    }
                    submitSearchForm();
                }
            });

            var endPicker = flatpickr(endInput, {
                dateFormat: DATE_FORMAT,
                allowInput: false,
                onChange: function (selectedDates) {
                    if (selectedDates[0]) {
                        startPicker.set('maxDate', selectedDates[0]);
                    }
                    submitSearchForm();
                }
            });

            function setRange(start, end) {
                // ✅ minDate/maxDate 제약이 걸린 상태에서 setDate를 호출하면,
                //    새로 넣으려는 날짜가 기존 제약 범위를 벗어날 경우 flatpickr가
                //    그 값을 무시(보정)해버려 종료일이 안 바뀌는 문제가 생긴다.
                //    그래서 먼저 제약을 풀고(null) 두 날짜를 모두 반영한 뒤,
                //    마지막에 정확한 min/max 제약을 다시 건다.
                startPicker.set('maxDate', null);
                endPicker.set('minDate', null);

                startPicker.setDate(start, false);
                endPicker.setDate(end, false);

                startPicker.set('maxDate', end);
                endPicker.set('minDate', start);
            }

            function applyRecentDays(days) {
                var today = new Date();
                var from  = addDays(today, -(days - 1));
                setRange(from, today);
            }

            if (!startInput.value || !endInput.value) {
                applyRecentDays(5);
            }

            /* 초기 세팅 후 카드 기간 즉시 반영 */
            syncTimePeriod();

            autoSubmitEnabled = true;

            document.getElementById('recentPeriodBtn').addEventListener('click', function () {
                applyRecentDays(5);
                submitSearchForm();
            });

            document.getElementById('dateBackBtn').addEventListener('click', function () {
                var curStart = parseFormatted(startInput.value);
                var curEnd   = parseFormatted(endInput.value);

                if (!curStart || !curEnd) {
                    applyRecentDays(5);
                    submitSearchForm();
                    return;
                }

                var dayMs    = 24 * 60 * 60 * 1000;
                var rangeDays = Math.round((curEnd.getTime() - curStart.getTime()) / dayMs) + 1;

                var newEnd   = addDays(curStart, -1);
                var newStart = addDays(newEnd, -(rangeDays - 1));

                setRange(newStart, newEnd);
                submitSearchForm();
            });
        })();
    </script>
</section>

</body>
</html>
