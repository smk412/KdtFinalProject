<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org/"
      th:replace="~{common/layouts/default_layout :: layout(~{::section}, ~{::head})}">
<head>
    <title>WEPLE - 사용자 관리</title>
</head>
<body>
<section>
    <link rel="stylesheet" th:href="@{/css/admin/user-list.css}">
    <div class="user-management-page">
        <h1 class="user-management-title">사용자관리</h1>

        <div id="userManagementList" class="user-management-panel">
            <p class="user-management-message user-management-message-success" th:if="${userSuccess}" th:text="${userSuccess}">사용자 상태가 변경되었습니다.</p>
            <p class="user-management-message user-management-message-error" th:if="${userError}" th:text="${userError}">사용자 상태를 변경할 수 없습니다.</p>
            <div class="user-management-toolbar">
                <form id="userSearchForm" class="user-search" method="get" th:action="@{/userList}">
                    <label class="sr-only" for="userSearch">아이디 또는 이름 검색</label>
                    <i class="fa fa-search" aria-hidden="true"></i>
                    <input id="userSearch" name="keyword" type="search" th:value="${keyword}" placeholder="아이디 또는 이름을 검색하세요." autocomplete="off">
                </form>
                <button class="user-register-button" type="button">
                    <i class="fa fa-user-plus" aria-hidden="true"></i>
                    <span>사용자 등록</span>
                </button>
            </div>

            <!-- 가입승인 완료 후 활성 또는 비활성 상태인 같은 회사 사용자만 출력합니다. -->
            <div class="user-table-wrap">
                <table class="user-table">
                    <thead>
                        <tr>
                            <th><input type="checkbox" aria-label="전체 사용자 선택" disabled></th>
                            <th>아이디</th>
                            <th>이름</th>
                            <th>이메일</th>
                            <th>역할</th>
                            <th>상태 활성화</th>
                            <th><span class="sr-only">더보기</span></th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="user : ${userList}">
                            <td><input type="checkbox" th:attr="aria-label=${user.loginId + ' 선택'}" disabled></td>
                            <td th:text="${user.loginId}">admin</td>
                            <td th:text="${user.userName}">관리자</td>
                            <td th:text="${user.email}">admin@weple.com</td>
                            <td th:text="${user.roleName}">관리자</td>
                            <td>
                                <!-- 최고관리자는 항상 잠그고, 부여받은 관리자는 기업최고관리자만 변경할 수 있습니다. -->
                                <span class="user-status-switch user-status-switch-locked"
                                      th:if="${user.ownerYn == 1 or (!isCompanyOwner and user.adminYn == 1)}"
                                      th:title="${user.ownerYn == 1 ? '최고관리자 계정은 비활성화할 수 없습니다.' : '기업최고관리자만 관리자 계정의 상태를 변경할 수 있습니다.'}">
                                    <input type="checkbox" th:checked="${user.status == 'a2'}" disabled aria-label="관리자 상태 변경 불가">
                                    <span></span>
                                </span>
                                <form class="user-status-form"
                                      th:unless="${user.ownerYn == 1 or (!isCompanyOwner and user.adminYn == 1)}"
                                      th:action="@{/userList/{userCode}/status(userCode=${user.userCode})}" method="post">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                    <input type="hidden" name="status" th:value="${user.status == 'a2' ? 'a3' : 'a2'}">
                                    <input type="hidden" name="page" th:value="${currentPage}">
                                    <input type="hidden" name="keyword" th:value="${keyword}">
                                    <label class="user-status-switch">
                                        <input type="checkbox" th:checked="${user.status == 'a2'}" th:attr="aria-label=${user.loginId + ' 활성 상태 변경'}" onchange="this.form.submit()">
                                        <span></span>
                                    </label>
                                </form>
                            </td>
                            <td><button class="user-more-button" type="button" th:attr="aria-label=${user.loginId + ' 더보기'}"><i class="fa fa-ellipsis-h"></i></button></td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(userList)}">
                            <td class="user-empty" colspan="7">표시할 사용자가 없습니다.</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <nav class="user-pagination" th:if="${totalPages > 1}" aria-label="사용자 목록 페이지">
                <a class="user-page-button" th:href="@{/userList(page=${currentPage - 1}, keyword=${keyword})} + '#userManagementList'" th:classappend="${currentPage <= 1} ? 'disabled' : ''">이전</a>
                <a class="user-page-button" th:each="i : ${#numbers.sequence(startPage, endPage)}" th:href="@{/userList(page=${i}, keyword=${keyword})} + '#userManagementList'" th:text="${i}" th:classappend="${i == currentPage} ? 'active' : ''"></a>
                <a class="user-page-button" th:href="@{/userList(page=${currentPage + 1}, keyword=${keyword})} + '#userManagementList'" th:classappend="${currentPage >= totalPages} ? 'disabled' : ''">다음</a>
            </nav>
        </div>
    </div>
    <script>
        // 검색 결과 영역만 비동기로 교체해 입력 중 페이지 전체가 새로고침되지 않도록 처리합니다.
        (function () {
            var searchDelay;
            var searchRequest;

            document.addEventListener('input', function (event) {
                if (event.target.id !== 'userSearch') {
                    return;
                }

                window.clearTimeout(searchDelay);
                searchDelay = window.setTimeout(function () {
                    var searchInput = event.target;
                    var searchForm = document.getElementById('userSearchForm');
                    var searchUrl = searchForm.action + '?keyword=' + encodeURIComponent(searchInput.value);

                    if (searchRequest) {
                        searchRequest.abort();
                    }
                    searchRequest = new AbortController();

                    fetch(searchUrl, { signal: searchRequest.signal })
                        .then(function (response) {
                            if (!response.ok) {
                                throw new Error('사용자 목록을 조회할 수 없습니다.');
                            }
                            return response.text();
                        })
                        .then(function (html) {
                            var responseDocument = new DOMParser().parseFromString(html, 'text/html');
                            var nextList = responseDocument.getElementById('userManagementList');
                            var currentList = document.getElementById('userManagementList');

                            if (!nextList || !currentList) {
                                return;
                            }

                            currentList.innerHTML = nextList.innerHTML;
                            window.history.replaceState(null, '', searchUrl + '#userManagementList');

                            // 목록 교체 뒤에도 검색창에서 계속 입력할 수 있도록 포커스와 커서 위치를 복원합니다.
                            var nextSearchInput = document.getElementById('userSearch');
                            nextSearchInput.focus();
                            nextSearchInput.setSelectionRange(nextSearchInput.value.length, nextSearchInput.value.length);
                        })
                        .catch(function (error) {
                            if (error.name !== 'AbortError') {
                                console.error(error);
                            }
                        });
                }, 300);
            });
        }());
    </script>
</section>
</body>
</html>
