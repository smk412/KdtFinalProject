<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org/"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      th:replace="~{common/layouts/default_layout :: layout(~{::section}, ~{::head})}">
<head>
    <title>WEPLE - 마일스톤 관리</title>
    <link rel="stylesheet" th:href="@{/css/milestone/milestone-list.css}">
</head>
<body>
<section>
    <div class="milestone-page">
        <div class="milestone-page-header">
            <h1 class="milestone-page-title">마일스톤 관리</h1>
            <a th:href="@{/project/milestone/insert(projectId=${projectId})}" class="milestone-add-link">+ 새 마일스톤 추가</a>
        </div>

        <div class="milestone-container" th:each="milestone : ${milestones}">
            
            <div class="milestone-header" th:data-milestone-id="${milestone.milestoneId}">
                
                <div class="view-mode-container" style="display: flex; width: 100%; justify-content: space-between; align-items: center;">
                    <div class="milestone-title-group">
                        <span class="milestone-icon">📋</span>
                        <h2 class="milestone-title" th:text="${milestone.milestoneTitle}">설계</h2>
                        
                        <span class="milestone-badge" 
                              th:classappend="${milestone.milestoneStatus == 'g2' ? 'badge-success' : 'badge-process'}"
                              th:text="${milestone.milestoneStatus == 'g2' ? '완료' : '진행 중'}">진행 중</span>
                        
                        <span class="milestone-due-date" 
                              th:if="${milestone.finishDate != null}"
                              th:text="${#temporals.format(milestone.finishDate, 'yyyy.MM.dd')} + ' 까지'">2026.03.01 까지</span>
                        
                        <span class="milestone-badge badge-delay-text" 
                              th:if="${milestone.delayDays > 0}" 
                              th:text="'지연됨 (D+' + ${milestone.delayDays} + ')'">지연됨 (D+2)</span>
                    </div>
                    <button type="button" class="milestone-edit-btn" onclick="enableEditMode(this)">마일스톤 편집</button>
                </div>

                <div class="edit-mode-container" style="display: none; width: 100%; justify-content: space-between; align-items: center;">
                    <div class="milestone-edit-inputs" style="display: flex; gap: 15px; align-items: center;">
                        <input type="text" class="edit-title-input" th:value="${milestone.milestoneTitle}" placeholder="마일스톤명 입력" />
                        
                        <input type="date" class="edit-date-input" th:value="${milestone.finishDate}" />
                        
                        <label class="switch-label" style="position: relative; display: inline-block; width: 44px; height: 22px;">
                            <input type="checkbox" class="edit-status-toggle" 
                                   th:checked="${milestone.milestoneStatus == 'g2'}"
                                   th:disabled="${milestone.progressPercentage < 100}" />
                            <span class="slider round"></span>
                        </label>
                        <span class="switch-text" 
                              th:text="${milestone.progressPercentage == 100 ? '상태 토글 가능' : '진척도 100% 필수'}"
                              style="font-size: 12px; color: #888;">진척도 100% 필수</span>
                    </div>
                    
                    <div class="milestone-action-btns">
                        <button type="button" class="milestone-cancel-btn" onclick="cancelEditMode(this)">취소</button>
                        <button type="button" class="milestone-save-btn" onclick="saveMilestone(this)">변경</button>
                    </div>
                </div>
                
            </div>

            <div class="milestone-progress-row">
                <div class="milestone-progress-bar-wrap">
                    <div class="milestone-progress-bar" th:style="'width: ' + ${milestone.progressPercentage} + '%'"></div>
                </div>
                <span class="milestone-progress-percent" th:text="${milestone.progressPercentage} + '%'">100%</span>
            </div>
            
            <div class="milestone-task-summary">
                <span th:text="${milestone.totalTaskCount} + '일감 (' + ${milestone.closedTaskCount} + ' 건 완료 — ' + (${milestone.progressPercentage == 100} ? '모두 완료' : '진행중') + ')'">
                    10일감 (10 건 완료 — 모두 완료)
                </span>
            </div>

            <div class="connected-tasks-section">
                <h3 class="connected-tasks-title">연결된 일감 (최근 5개)</h3>
                
                <div class="task-list-card">
                    <div class="task-item-row" th:each="task : ${milestone.recentTasks}">
                        <div class="task-col col-id" th:text="'#' + ${task.taskId}">#1</div>
                        
                        <div class="task-col col-type">
                            <span class="task-type-tag" th:text="${task.typeName}">일감유형</span>
                        </div>
                        
                        <div class="task-col col-name">
                            <a th:href="@{/project/task/detail(taskId=${task.taskId})}" th:text="${task.taskTitle}">일감명</a>
                        </div>
                        
                        <div class="task-col col-progress">
                            <div class="task-mini-bar-wrap">
                                <div class="task-mini-bar" th:style="'width: ' + ${task.taskProgress} + '%'"></div>
                            </div>
                            <span class="task-mini-percent" th:text="${task.taskProgress} + '%'">80%</span>
                        </div>
                        
                        <div class="task-col col-assignee" th:text="${task.taskManager}">담당자명</div>
                        
                        <div class="task-col col-status">
                            <span class="status-dot-group" th:classappend="'status-' + ${task.taskStatus}">
                                <span class="status-dot"></span>
                                <span class="status-text" th:text="${task.defaultDescribe}">진행중</span>
                            </span>
                        </div>
                    </div>

                    <div class="task-empty-row" th:if="${#lists.isEmpty(milestone.recentTasks)}">
                        연결된 일감이 존재하지 않습니다.
                    </div>
                </div>
            </div>
            
        </div>
    </div>
    
    <script th:inline="javascript">
		// 1. 편집 모드로 전환 (일반 UI 가이드 숨기고 인풋 폼 노출)
		function enableEditMode(button) {
		    const header = button.closest('.milestone-header');
		    header.querySelector('.view-mode-container').style.display = 'none';
		    header.querySelector('.edit-mode-container').style.display = 'flex';
		}
		
		// 2. 편집 취소 (인풋 폼 숨기고 일반 UI 가이드 원복)
		function cancelEditMode(button) {
		    const header = button.closest('.milestone-header');
		    header.querySelector('.edit-mode-container').style.display = 'none';
		    header.querySelector('.view-mode-container').style.display = 'flex';
		}
		
		// 3. 비동기(AJAX) 데이터 변경 및 저장 처리
		function saveMilestone(button) {
		    const header = button.closest('.milestone-header');
		    const milestoneId = header.getAttribute('data-milestone-id');
		    
		    const updatedTitle = header.querySelector('.edit-title-input').value;
		    const updatedDate = header.querySelector('.edit-date-input').value;
		    const isChecked = header.querySelector('.edit-status-toggle').checked;
		    const updatedStatus = isChecked ? 'g2' : 'g1';
		
		    // 기본 validation
		    if (!updatedTitle.trim()) {
		        alert("마일스톤 명칭은 공백일 수 없습니다.");
		        return;
		    }
		
		    // 기존 백엔드 Controller 규격(@RequestParam 수신 양식)과 매핑 연동을 위한 인코딩 변환
		    const formData = new URLSearchParams();
		    formData.append('milestoneId', milestoneId);
		    formData.append('projectId', new URLSearchParams(window.location.search).get('projectId')); // 쿼리스트링 파라미터 자동 연동
		    formData.append('milestoneTitle', updatedTitle);
		    formData.append('finishDate', updatedDate);
		    formData.append('milestoneStatus', updatedStatus);
		
		    // 비동기 통신 요청 전송
		    fetch('/project/milestone/update', {
		        method: 'POST',
		        headers: {
		            'Content-Type': 'application/x-www-form-urlencoded'
		        },
		        body: formData
		    })
		    .then(response => {
		        if (response.ok) {
		            alert('마일스톤 수정이 완료되었습니다.');
		            location.reload(); // 화면 즉시 새로고침하여 바뀐 데이터 재조회 반영
		        } else {
		            alert('수정 작업 처리에 실패하였습니다. 데이터 무결성을 체크해 주세요.');
		        }
		    })
		    .catch(error => {
		        console.error('AJAX 전송 처리 에러:', error);
		        alert('네트워크 상태가 불안정하여 변경할 수 없습니다.');
		    });
		}
	</script>
</section>


</body>
</html>
